<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DevFlex Solutions</title>
    <meta name="description" content="Get in touch with DevFlex Solutions for personalized digital solutions, custom software, and AI integrations.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://devflexsolutions.com/contact.html">
    <meta property="og:title" content="Contact Us | DevFlex Solutions">
    <meta property="og:description" content="Reach out to discuss your next digital project or AI automation.">
    <meta property="og:image" content="assets/DEVFLEX%20LOGO.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://devflexsolutions.com/contact.html">
    <meta property="twitter:title" content="Contact Us | DevFlex Solutions">
    <meta property="twitter:description" content="Reach out to discuss your next digital project or AI automation.">
    <meta property="twitter:image" content="assets/DEVFLEX%20LOGO.png">

    <link rel="icon" type="image/x-icon" href="assets/DEVFLEX%20LOGO.ico">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div id="navbar"></div>
    </header>

    <main>
        <!-- Añadimos un padding-top extra para que el header fijo no tape el título -->
        <section id="contacto" class="contact" style="padding-top: 10rem; min-height: calc(100vh - 150px);">
            <div class="contact-container">
                <h2 class="section-title">Let's Connect</h2>
                <p class="section-subtitle">Reach out for collaborations, build your product from scratch, extra information about our products, or any other business inquiries.</p>

                <form class="contact-form animate-on-scroll" action="https://formsubmit.co/enmanuel02bnunez@gmail.com"
                    method="POST" target="hidden_iframe">
                    <!-- FormSubmit configuration -->
                    <input type="hidden" name="_subject" value="New Business Inquiry - DevFlex Solutions">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">
                    <input type="text" name="_honey" style="display:none">

                    <div class="form-group">
                        <label for="nombre">Name</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="numero">Phone Number</label>
                        <input type="tel" id="numero" name="numero" required>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Type here all the information.</label>
                        <textarea id="mensaje" name="mensaje" rows="6" required placeholder="How can we help you?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
                <iframe name="hidden_iframe" style="display:none;"></iframe>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    <script src="js/js.js"></script>
</body>

</html>
